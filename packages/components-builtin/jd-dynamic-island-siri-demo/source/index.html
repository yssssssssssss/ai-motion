<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>灵动岛组合通知与天气</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="siri-demo" data-motion-root aria-label="灵动岛组合通知与天气">
      <section class="phone-shell" aria-hidden="true">
        <div class="screen">
          <div class="wallpaper"></div>
          <div class="status-bar">
            <span>4:12</span>
            <span class="status-icons">▮▮▮ ))) 91</span>
          </div>
          <div class="app-icon">
            <span></span>
            <strong>Siri</strong>
          </div>
          <div class="dynamic-island">
            <span class="record-dot"></span>
            <span class="island-avatar"></span>
            <span class="island-glow"></span>
          </div>
          <article class="siri-notification">
            <div class="notification-copy">
              <strong>Hey Siri</strong>
              <span>Send a quick update and keep the focus on screen.</span>
            </div>
            <i></i>
          </article>
          <nav class="bottom-toolbar">
            <span></span><span></span><span></span><span></span><span></span>
            <strong class="dock-label">Focus</strong>
          </nav>
          <article class="weather-card">
            <div>
              <strong>New York, NY</strong>
              <span>Mostly sunny</span>
            </div>
            <b>74°</b>
          </article>
        </div>
      </section>
    </main>
    <script src="./script.js"></script>
  </body>
</html>
