<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>灵动岛 Siri 控制栏联动</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="siri-demo control-reveal-demo" data-motion-root aria-label="灵动岛 Siri 控制栏联动">
      <section class="phone-shell" aria-hidden="true">
        <div class="screen">
          <div class="wallpaper"></div>
          <div class="status-bar">
            <span>4:12</span>
            <span class="status-icons">▮▮▮ ))) 91</span>
          </div>
          <div class="app-icon">
            <span></span>
            <strong>Siri</strong>
          </div>
          <div class="dynamic-island">
            <span class="record-dot"></span>
            <span class="island-glow"></span>
          </div>
          <article class="siri-notification">
            <div class="notification-copy">
              <strong>Hey Siri</strong>
              <span>Send a quick update and keep the focus on screen.</span>
            </div>
            <i></i>
          </article>
          <nav class="bottom-toolbar"><span></span><span></span><span></span><span></span><span></span></nav>
          <article class="status-card">
            <strong>Siri is ready</strong>
            <span>Listening for the next command.</span>
          </article>
        </div>
      </section>
    </main>
    <script src="./script.js"></script>
  </body>
</html>
