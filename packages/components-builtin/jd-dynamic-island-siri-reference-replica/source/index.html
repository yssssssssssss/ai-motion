<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>灵动岛 Siri 高保真参考</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main
      class="siri-reference reference-replica-demo"
      data-motion-root
      aria-label="灵动岛 Siri 高保真参考"
    >
      <section class="phone-shell" aria-hidden="true">
        <div class="screen">
          <div class="wallpaper"></div>
          <div class="status-bar">
            <span>4:12</span>
            <span class="status-icons">▮▮▮ ))) 91</span>
          </div>

          <div class="siri-icon">
            <span class="siri-ring"></span>
            <strong>Siri</strong>
          </div>

          <div class="dynamic-island">
            <span class="record-dot"></span>
            <span class="island-light-scan"></span>
            <span class="island-hotspot cyan"></span>
            <span class="island-hotspot rose"></span>
          </div>

          <article class="siri-notification">
            <div class="notification-copy">
              <strong>Hello, Aaron. I'm doing well, thanks for asking.</strong>
              <span>How can I help you today?</span>
            </div>
            <span class="siri-orb"></span>
            <span class="notification-underline"></span>
          </article>

          <nav class="bottom-control-dock">
            <span class="dock-item compass"></span>
            <span class="dock-item needle"></span>
            <span class="dock-item siri-mini"></span>
            <span class="dock-item text"></span>
            <span class="dock-item more"></span>
          </nav>
        </div>
      </section>
    </main>
    <script src="./script.js"></script>
  </body>
</html>
